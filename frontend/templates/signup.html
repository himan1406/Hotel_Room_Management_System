{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="form-container">
    <div class="auth-tabs">
        <a href="/login" class="auth-tab">Sign In</a>
        <a href="/signup" class="auth-tab active">Register</a>
    </div>
    <p class="form-subtitle">Join HRMS to start booking your next stay.</p>
    <form id="signupForm">
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="full_name">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">
        </div>
        <div id="signupError" class="error-msg"></div>
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <p class="form-footer">
        Already have an account? <a href="/login">Login</a>
    </p>
    <p class="form-footer">
        <a href="/hotel-setup">Want to list your hotel?</a>
    </p>
</div>
{% endblock %}
