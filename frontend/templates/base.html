<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HRMS{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-inner">
            <a href="/" class="nav-brand">
                <span class="nav-brand-mark">H</span>
                <span class="nav-brand-text">Hotel<br>Room Management<br>System</span>
            </a>

            <div class="nav-links" id="navLinks">
                <a href="/">Home</a>
                <a href="/login" id="navLogin">Login</a>
                <a href="/signup" id="navSignup">Sign Up</a>
                <a href="/hotel-setup" id="navHotelSetup">List a Hotel</a>
                <a href="/dashboard" id="navDashboard" style="display:none">Dashboard</a>
                <a href="/admin" id="navAdmin" style="display:none">Admin</a>
            </div>

            <div class="nav-actions">
                <button id="navMessages" class="icon-btn" style="display:none" aria-label="Messages" onclick="toggleChatPanel()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span id="msgBadge" class="msg-badge" style="display:none">0</span>
                </button>

                <div class="nav-account" id="navAccount" style="display:none">
                    <button id="navAccountBtn" class="nav-account-btn" aria-haspopup="true" aria-expanded="false" onclick="toggleAccountMenu()">
                        <span class="nav-account-avatar" id="navAccountAvatar"></span>
                        <span id="navUserName" class="nav-account-name"></span>
                        <svg class="nav-account-chevron" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="nav-account-menu" id="navAccountMenu"></div>
                </div>

                <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="navLinks">
                    <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="2.4" rx="1.2"/><rect x="2" y="11" width="20" height="2.4" rx="1.2"/><rect x="2" y="17" width="20" height="2.4" rx="1.2"/></svg>
                </button>
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <div id="chatPanel" class="chat-panel" style="display:none">
        <div class="chat-header">
            <span>Messages</span>
            <button class="chat-close" onclick="toggleChatPanel()">&times;</button>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-conversations" id="chatConversations"></div>
            <div class="chat-conversation-view" id="chatConversationView" style="display:none">
                <div class="chat-view-header">
                    <button class="chat-back-btn" onclick="showChatConversations()">&larr;</button>
                    <span id="chatViewTitle">Chat</span>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-suggestions" id="chatSuggestions"></div>
                <div class="chat-input-area">
                    <textarea id="chatMessageInput" rows="1" placeholder="Type a message..."></textarea>
                    <button class="btn btn-primary btn-small" onclick="sendChatMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JS Bundle (single minified file, built with esbuild) -->
    <script src="/static/dist/bundle.min.js?v=1"></script>
</body>
</html>
