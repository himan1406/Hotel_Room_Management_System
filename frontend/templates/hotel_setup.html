{% extends "base.html" %}
{% block title %}Register Your Hotel{% endblock %}
{% block content %}
<div class="form-container">
    <h2>Register Your Hotel</h2>
    <p class="form-subtitle">Submit your details and a document for verification. An admin will review and approve your account.</p>
    <form id="hotelSetupForm">
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="full_name" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">
        </div>
        <div class="form-group">
            <label for="doc">Business Document (PDF, image — will be reviewed by admin)</label>
            <input type="file" id="doc" name="doc" accept=".pdf,.jpg,.jpeg,.png">
        </div>
        <div id="hotelSetupError" class="error-msg"></div>
        <div id="hotelSetupSuccess" class="success-msg"></div>
        <button type="submit" class="btn btn-primary btn-full">Submit for Approval</button>
    </form>
    <p class="form-footer">
        Already have an account? <a href="/login">Login</a>
    </p>
</div>
{% endblock %}
